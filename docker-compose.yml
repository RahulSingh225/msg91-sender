version: '3.8'

services:
  webhook:
    build: .
    container_name: play_webhook
    command: node webhook.js
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./callbacks:/app/callbacks

  dashboard:
    build: ./dashboard
    container_name: play_dashboard
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped
    depends_on:
      - webhook
