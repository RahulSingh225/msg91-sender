version: '3.8'

services:
  webhook:
    build: .
    container_name: play_webhook
    command: node webhook.js
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - CALLBACKS_CSV=/app/callbacks/callbacks.csv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./callbacks:/app/callbacks

# Use .env file in project root for environment variables when running compose
